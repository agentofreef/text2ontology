# docker-compose.yml — text2ontology, the single production-grade stack.
#
# ONE compose file for the whole project. The nginx `gateway` is the SOLE
# external ingress (host port 28080); Postgres, the six Go services, and the
# observability stack are reachable only on the internal Docker network (the
# observability UIs bind to 127.0.0.1 for local inspection). Non-root
# containers, per-service resource limits, least-privilege DB roles, graceful
# shutdown, and a one-shot `db-migrate` runner are all wired in.
#
# Pull-and-run: this file references the CI-published multi-arch images
# (ghcr.io/agentofreef/text2ontology-*:latest). A user just needs:
#
#     docker compose up -d        # pulls prebuilt images, runs the whole stack
#     open http://localhost:28080 # admin / admin (default)
#
# It runs out of the box — every secret has a safe DEV default baked in below.
# For a real deployment:
#   1. cp .env.example .env
#   2. set strong values (openssl rand -hex 32) for every secret
#   3. set REQUIRE_STRONG_SECRETS=true  → services then FAIL-CLOSED on weak secrets
# `.env` is auto-read by docker compose for ${VAR} interpolation; it is
# gitignored — never commit real secrets.
#
# Maintainers building images locally: use `make build` (docker build per
# service); CI publishes :latest on push to main. The frontend image must be
# built in CI / on a glibc x86_64 or native arm64 runner — its @swc/core
# postinstall SIGBUSes under some local emulation setups.

name: text2ontology

# Shared app-service env — safe DEV defaults, override via .env for production.
# The `change_me` / `admin` sentinels are deliberate: with
# REQUIRE_STRONG_SECRETS=true the services refuse to start until you replace them.
x-app-env: &app-env
  REQUIRE_STRONG_SECRETS: ${REQUIRE_STRONG_SECRETS:-false}
  AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-t2o_dev_change_me_auth_secret_min_32_chars_0000}
  INTERNAL_TOKEN: ${INTERNAL_TOKEN:-t2o_dev_change_me_internal_token}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:28080}
  OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.25}

services:
  # ── Single external ingress ────────────────────────────────────────────────
  gateway:
    image: ghcr.io/agentofreef/text2ontology-gateway:${IMAGE_TAG:-latest}
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 256
    ports:
    - 28080:8080
    depends_on:
      frontend:
        condition: service_healthy
      backend-api:
        condition: service_healthy
      agent-server:
        condition: service_healthy
      collector-server:
        condition: service_healthy
      mcp-tools-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    image: ghcr.io/agentofreef/text2ontology-frontend:${IMAGE_TAG:-latest}
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 256
    depends_on:
      backend-api:
        condition: service_healthy
      agent-server:
        condition: service_healthy
      recall-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Go services (each connects as its own least-privilege Postgres role) ────
  backend-api:
    image: ghcr.io/agentofreef/text2ontology-backend-api:${IMAGE_TAG:-latest}
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command: ["-port", "8090"]
    environment:
      <<: *app-env
      DATABASE_URL: postgres://backend_api_user:${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      OTEL_SERVICE_NAME: backend-api
      LAKEHOUSE_SQL_URL: http://lakehouse-sql-server:8094
    healthcheck:
      test: ["CMD-SHELL", 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8090/healthz?check=db"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      lakehouse-sql-server:
        condition: service_healthy
    restart: unless-stopped

  agent-server:
    image: ghcr.io/agentofreef/text2ontology-agent-server:${IMAGE_TAG:-latest}
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command: ["-port", "8092"]
    environment:
      <<: *app-env
      DATABASE_URL: postgres://agent_server_user:${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      OTEL_SERVICE_NAME: agent-server
      LAKEHOUSE_SQL_URL: http://lakehouse-sql-server:8094
      RECALL_SERVER_URL: http://recall-server:8093
      USE_MISSION_ACT: 'true'
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      lakehouse-sql-server:
        condition: service_healthy
      recall-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8092/healthz?check=db"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  recall-server:
    image: ghcr.io/agentofreef/text2ontology-recall-server:${IMAGE_TAG:-latest}
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command: ["-port", "8093"]
    environment:
      <<: *app-env
      DATABASE_URL: postgres://recall_server_user:${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      OTEL_SERVICE_NAME: recall-server
    healthcheck:
      test: ["CMD-SHELL", 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8093/healthz?check=db"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  lakehouse-sql-server:
    image: ghcr.io/agentofreef/text2ontology-lakehouse-sql-server:${IMAGE_TAG:-latest}
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command: ["-port", "8094"]
    environment:
      <<: *app-env
      DATABASE_URL: postgres://lakehouse_sql_server_user:${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      OTEL_SERVICE_NAME: lakehouse-sql-server
    healthcheck:
      test: ["CMD-SHELL", 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8094/healthz?check=db"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  mcp-tools-server:
    image: ghcr.io/agentofreef/text2ontology-mcp-tools-server:${IMAGE_TAG:-latest}
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command: ["-port", "8095"]
    environment:
      <<: *app-env
      DATABASE_URL: postgres://mcp_tools_server_user:${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      OTEL_SERVICE_NAME: mcp-tools-server
      RECALL_SERVER_URL: http://recall-server:8093
      LAKEHOUSE_SQL_URL: http://lakehouse-sql-server:8094
      BACKEND_API_URL: http://backend-api:8090
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      recall-server:
        condition: service_healthy
      lakehouse-sql-server:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8095/healthz?check=db"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  collector-server:
    image: ghcr.io/agentofreef/text2ontology-collector-server:${IMAGE_TAG:-latest}
    # PBIX/PBIT decode is a Python subprocess (~7s, ~235MB peak per file). Job
    # worker count and the pbix decode semaphore are kept equal so workers never
    # block idle on the semaphore; mem/cpu are sized for that concurrency.
    mem_limit: ${COLLECTOR_MEM_LIMIT:-3g}
    cpus: '${COLLECTOR_CPUS:-8.0}'
    pids_limit: 512
    command: ["-port", "8096"]
    environment:
      <<: *app-env
      DATABASE_URL: postgres://collector_server_user:${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      OTEL_SERVICE_NAME: collector-server
      PBIT_STAGING_ROOT: /data/pbit-staging
      PBIX_SCRIPTS_DIR: /app/scripts
      FILE_UPLOAD_ROOT: /data/uploads
      # Parallel PBIX decode slots + job workers (kept equal). Each decode peaks
      # ~235MB; 8 × ~235MB ≈ 1.9G fits the 3g limit. Load-tested: 16/16/5g
      # saturates CPU+RAM and starves the upload path — 8 is the balanced default.
      # Raise these three together (CONCURRENCY/MEM_LIMIT/CPUS) for more throughput.
      COLLECTOR_PBIX_CONCURRENCY: "${COLLECTOR_PBIX_CONCURRENCY:-8}"
      COLLECTOR_JOB_WORKERS: "${COLLECTOR_JOB_WORKERS:-8}"
    volumes:
    - collector-staging:/data/pbit-staging
    - collector-uploads:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8096/healthz?check=db"']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Observability (UIs bound to 127.0.0.1 only) ────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 256
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
    - ./ops/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    mem_limit: 512m
    cpus: '0.5'
    pids_limit: 256
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
    - 127.0.0.1:16686:16686
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    mem_limit: 512m
    cpus: '0.5'
    pids_limit: 256
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
    - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./ops/alerts:/etc/prometheus/alerts:ro
    ports:
    - 127.0.0.1:9090:9090
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    mem_limit: 128m
    cpus: '0.25'
    pids_limit: 128
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
    - ./ops/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
    - 127.0.0.1:9093:9093
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    mem_limit: 512m
    cpus: '0.5'
    pids_limit: 256
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      # Land on the SLO dashboard right after login instead of an empty home.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/dashboards/lakehouse.json
    ports:
    - 127.0.0.1:3000:3000
    volumes:
    - grafana-data:/var/lib/grafana
    - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./ops/grafana/dashboards-provisioned:/etc/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  # ── Database + one-shot migration runner ───────────────────────────────────
  db-migrate:
    # One-shot: brings the DB (fresh OR existing) up to the current schema +
    # per-service least-privilege roles + role passwords, then applies
    # docs/migrations/*.sql exactly once each. App services wait for it
    # (depends_on: service_completed_successfully).
    image: pgvector/pgvector:pg16
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 256
    environment:
      DATABASE_URL: postgres://lakehouse2ontology-enterprise:${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}
    entrypoint: ["sh", "/run-migrations.sh"]
    volumes:
    - ./scripts/run-migrations.sh:/run-migrations.sh:ro
    - ./docs/schema/schema.sql:/migrations/schema.sql:ro
    - ./ops/db-roles.sql:/migrations/db-roles.sql:ro
    - ./docs/migrations:/migrations/versions:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    mem_limit: 1g
    cpus: '1.0'
    pids_limit: 512
    # max_connections raised from the default 100 to cover the 6-service pool
    # budget (6 × srvkit MaxOpen 20 = 120) plus headroom for psql/maintenance.
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB"]
    environment:
      POSTGRES_DB: lakehouse2ontology-enterprise
      POSTGRES_USER: lakehouse2ontology-enterprise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-t2o_dev_change_me_pg}
    volumes:
    - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse2ontology-enterprise"]
      interval: 5s
      retries: 10
      timeout: 3s
      start_period: 10s
    restart: unless-stopped

volumes:
  collector-staging:
  collector-uploads:
  postgres-data:
  grafana-data:
