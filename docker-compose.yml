# docker-compose.yml — lakehouse2ontology service mesh
#
# Architecture: `gateway` (nginx) is the SOLE external port-forwarding
# entry/exit for the whole stack. Every other service binds only on the
# compose network; the gateway proxies the public URL surface (frontend +
# /api/* + /connector/* + /mcp + /api/mcp/*) to the right service via
# compose DNS. See services/gateway/nginx.conf for the routing rules.
# Postgres is the one deliberate exception — its 5438 port stays open for
# DB administration tooling.
#
# Operator checklist before first run:
#   cp .env.shared.example .env.shared   # fill in DATABASE_URL + API keys
#   docker compose up -d
#   curl -s http://localhost:18080/healthz   # gateway liveness
#   open  http://localhost:18080             # UI (or http://localhost:10020)

services:

  # ── Gateway: SOLE external port-forwarding ingress ──────────────────────────
  # text2ontology-gateway is a thin nginx that reverse-proxies the public URL
  # surface to the right service over compose DNS. The browser hits ONE host
  # port; every other service binds only on the compose network. See
  # services/gateway/nginx.conf for the authoritative routing rules.
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-gateway:latest
    ports:
      - "18080:80"
      - "10020:80"
    depends_on:
      frontend:
        condition: service_healthy
      backend-api:
        condition: service_healthy
      agent-server:
        condition: service_healthy
      collector-server:
        condition: service_healthy
      mcp-tools-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Frontend (Next.js static, served by an internal nginx) ─────────────────
  # Reached only via the gateway in production; bundle is built with empty
  # NEXT_PUBLIC_*_URL so the browser uses same-origin URLs that the gateway
  # then dispatches by path.
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-frontend:latest
    depends_on:
      backend-api:
        condition: service_healthy
      agent-server:
        condition: service_healthy
      recall-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ── Go service stubs ────────────────────────────────────────────────────────
  # Each has its own services/<name>/Dockerfile.
  # Phase 1+ will replace each stub with the real migrated implementation.

  backend-api:
    # Phase 3 B4a: swapped stub → real service. Currently owns the
    # six leaf ontology CRUD entity pairs migrated in B2/B3
    # (versions, aliases, rules, methods, skills, links) under
    # /internal/backend-api/*. The monolith reverse-proxies the
    # public /api/ontology/* surface here when BACKEND_API_URL is
    # set (see services/backend-api/cmd/server/register_public_api.go).
    build:
      context: .
      dockerfile: services/backend-api/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-backend-api:latest
    command: ["-port", "8090"]
    env_file:
      - .env.shared
    environment:
      DATABASE_URL: "${DATABASE_URL_CONTAINER}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "backend-api"
      # P7.4 dry-run validation on POST/PUT /api/ontology/metric-intents.
      # Empty / unset → save without validation (dev-friendly degraded mode).
      LAKEHOUSE_SQL_URL: "http://lakehouse-sql-server:8094"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
      lakehouse-sql-server:
        condition: service_healthy
    restart: unless-stopped

  agent-server:
    # Phase 2 A4a: swapped stub → real service. Talks to sibling
    # services via compose DNS (lakehouse-sql-server:8094,
    # recall-server:8093) — no host NAT round-trip.
    build:
      context: .
      dockerfile: services/agent-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-agent-server:latest
    command: ["-port", "8092"]
    env_file:
      - .env.shared
    environment:
      DATABASE_URL: "${DATABASE_URL_CONTAINER}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "agent-server"
      LAKEHOUSE_SQL_URL: "http://lakehouse-sql-server:8094"
      RECALL_SERVER_URL: "http://recall-server:8093"
      # MissionAct (.omc/specs/mission-act.md). Off ⇒ byte-identical
      # legacy behavior; on ⇒ shadow missions + capability-gap tool.
      USE_MISSION_ACT: "true"

    depends_on:
      postgres:
        condition: service_healthy
      lakehouse-sql-server:
        condition: service_healthy
      recall-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8092/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  recall-server:
    # Phase 1 R4a: swapped stub → real service (Od recall + vector + OTel).
    build:
      context: .
      dockerfile: services/recall-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-recall-server:latest
    command: ["-port", "8093"]
    env_file:
      - .env.shared
    environment:
      DATABASE_URL: "${DATABASE_URL_CONTAINER}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "recall-server"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8093/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  lakehouse-sql-server:
    # Phase 1 D4a: swapped from shared Phase-0 stub to real service
    # (OTel + pgvector-aware SQL engine). Other services still stub.
    build:
      context: .
      dockerfile: services/lakehouse-sql-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-lakehouse-sql-server:latest
    command: ["-port", "8094"]
    env_file:
      - .env.shared
    environment:
      DATABASE_URL: "${DATABASE_URL_CONTAINER}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "lakehouse-sql-server"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8094/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mcp-tools-server:
    # Phase 3 MCP: swapped stub → real service. External MCP tool gateway
    # exposing lookup_od + execute_smartquery + recall_tokens to
    # third-party consumers (Claude Code, operator scripts). Has its own
    # bearer-token auth (MCP_API_KEY) distinct from INTERNAL_TOKEN.
    # No direct DB access — proxies to backend-api + recall-server +
    # lakehouse-sql-server via compose DNS.
    build:
      context: .
      dockerfile: services/mcp-tools-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-mcp-tools-server:latest
    command: ["-port", "8095"]
    env_file:
      - .env.shared
    environment:
      # DB is for the mcp_api_key auth store only. Container must
      # reach WSL-private Postgres through host-gateway.
      DATABASE_URL: "${DATABASE_URL_CONTAINER}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "mcp-tools-server"
      RECALL_SERVER_URL: "http://recall-server:8093"
      LAKEHOUSE_SQL_URL: "http://lakehouse-sql-server:8094"
      BACKEND_API_URL: "http://backend-api:8090"

    depends_on:
      postgres:
        condition: service_healthy
      recall-server:
        condition: service_healthy
      lakehouse-sql-server:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8095/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  collector-server:
    # Phase 1: collector-server shell. Phase 2-4 will add ingest routes.
    build:
      context: .
      dockerfile: services/collector-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-collector-server:latest
    command: ["-port", "8096"]
    env_file:
      - .env.shared
    environment:
      DATABASE_URL: "${DATABASE_URL_CONTAINER}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "collector-server"
      PBIT_STAGING_ROOT: "/data/pbit-staging"
      PBIX_SCRIPTS_DIR: "/app/scripts"
      FILE_UPLOAD_ROOT: "/data/uploads"
    volumes:
      - collector-staging:/data/pbit-staging
      - collector-uploads:/data/uploads

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8096/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # NOTE: No `frontend` service — backend-api serves the static Next.js export
  # via the -static flag (per plan OQ-1). Run: backend-api -static ./frontend/out

  # ── Observability stack (P1-15) ─────────────────────────────────────────────
  # otel-collector receives OTLP from all 6 services (they already point
  # OTEL_EXPORTER_OTLP_ENDPOINT at otel-collector:4317), fans traces to Jaeger,
  # and exposes a Prometheus scrape on :8889. Brought up ahead of the DB-role
  # cutover (Wave 4) so that high-blast-radius wave is observable. Operator UIs
  # bind to 127.0.0.1 only (gateway remains the sole public ingress).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./ops/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  # ── Local Postgres (pgvector) ───────────────────────────────────────────────
  # Self-contained: schema.sql is auto-applied on first start via
  # /docker-entrypoint-initdb.d. No manual psql step required.
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lakehouse2ontology-enterprise
      POSTGRES_USER: lakehouse2ontology-enterprise
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "5438:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Auto-init: schema.sql runs once, when the volume is empty.
      - ./docs/schema/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse2ontology-enterprise"]
      interval: 5s
      retries: 10
      timeout: 3s
      start_period: 10s
    restart: unless-stopped

volumes:
  collector-staging:
  collector-uploads:
  postgres-data:
  grafana-data:
