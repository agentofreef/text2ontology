# docker-compose.product-ready.yml — ISOLATED single-ingress deployment of the
# product-ready build. Separate compose project (name: t2o-product-ready), runs
# ALONGSIDE the dev stack untouched. ONLY the gateway port is published
# (28080->8080); all other services network-internal. Own images
# (:product-ready) for the 8 built services; third-party obs images unchanged.
# Each service connects as its own least-privilege Postgres role (ops/db-roles.sql,
# applied at initdb); roles share POSTGRES_PASSWORD on this isolated internal DB.

name: t2o-product-ready
services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-gateway:product-ready
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 256
    ports:
    - 28080:8080
    depends_on:
      frontend:
        condition: service_healthy
      backend-api:
        condition: service_healthy
      agent-server:
        condition: service_healthy
      collector-server:
        condition: service_healthy
      mcp-tools-server:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://127.0.0.1:8080/healthz
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-frontend:product-ready
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 256
    depends_on:
      backend-api:
        condition: service_healthy
      agent-server:
        condition: service_healthy
      recall-server:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - http://127.0.0.1:8080/healthz
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
  backend-api:
    build:
      context: .
      dockerfile: services/backend-api/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-backend-api:product-ready
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command:
    - -port
    - '8090'
    env_file:
    - .env.shared
    environment:
      DATABASE_URL: postgres://backend_api_user:${POSTGRES_PASSWORD}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      REQUIRE_STRONG_SECRETS: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.25}
      OTEL_SERVICE_NAME: backend-api
      LAKEHOUSE_SQL_URL: http://lakehouse-sql-server:8094
    healthcheck:
      test:
      - CMD-SHELL
      - 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8090/healthz?check=db"'
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      lakehouse-sql-server:
        condition: service_healthy
    restart: unless-stopped
  agent-server:
    build:
      context: .
      dockerfile: services/agent-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-agent-server:product-ready
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command:
    - -port
    - '8092'
    env_file:
    - .env.shared
    environment:
      DATABASE_URL: postgres://agent_server_user:${POSTGRES_PASSWORD}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      REQUIRE_STRONG_SECRETS: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.25}
      OTEL_SERVICE_NAME: agent-server
      LAKEHOUSE_SQL_URL: http://lakehouse-sql-server:8094
      RECALL_SERVER_URL: http://recall-server:8093
      USE_MISSION_ACT: 'true'
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      lakehouse-sql-server:
        condition: service_healthy
      recall-server:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8092/healthz?check=db"'
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
  recall-server:
    build:
      context: .
      dockerfile: services/recall-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-recall-server:product-ready
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command:
    - -port
    - '8093'
    env_file:
    - .env.shared
    environment:
      DATABASE_URL: postgres://recall_server_user:${POSTGRES_PASSWORD}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      REQUIRE_STRONG_SECRETS: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.25}
      OTEL_SERVICE_NAME: recall-server
    healthcheck:
      test:
      - CMD-SHELL
      - 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8093/healthz?check=db"'
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
  lakehouse-sql-server:
    build:
      context: .
      dockerfile: services/lakehouse-sql-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-lakehouse-sql-server:product-ready
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command:
    - -port
    - '8094'
    env_file:
    - .env.shared
    environment:
      DATABASE_URL: postgres://lakehouse_sql_server_user:${POSTGRES_PASSWORD}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      REQUIRE_STRONG_SECRETS: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.25}
      OTEL_SERVICE_NAME: lakehouse-sql-server
    healthcheck:
      test:
      - CMD-SHELL
      - 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8094/healthz?check=db"'
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
  mcp-tools-server:
    build:
      context: .
      dockerfile: services/mcp-tools-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-mcp-tools-server:product-ready
    mem_limit: 512m
    cpus: '1.0'
    pids_limit: 512
    command:
    - -port
    - '8095'
    env_file:
    - .env.shared
    environment:
      DATABASE_URL: postgres://mcp_tools_server_user:${POSTGRES_PASSWORD}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      REQUIRE_STRONG_SECRETS: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.25}
      OTEL_SERVICE_NAME: mcp-tools-server
      RECALL_SERVER_URL: http://recall-server:8093
      LAKEHOUSE_SQL_URL: http://lakehouse-sql-server:8094
      BACKEND_API_URL: http://backend-api:8090
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      recall-server:
        condition: service_healthy
      lakehouse-sql-server:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8095/healthz?check=db"'
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
  collector-server:
    build:
      context: .
      dockerfile: services/collector-server/Dockerfile
    image: ghcr.io/agentofreef/text2ontology-collector-server:product-ready
    mem_limit: 1g
    cpus: '1.0'
    pids_limit: 512
    command:
    - -port
    - '8096'
    env_file:
    - .env.shared
    environment:
      DATABASE_URL: postgres://collector_server_user:${POSTGRES_PASSWORD}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      REQUIRE_STRONG_SECRETS: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-0.25}
      OTEL_SERVICE_NAME: collector-server
      PBIT_STAGING_ROOT: /data/pbit-staging
      PBIX_SCRIPTS_DIR: /app/scripts
      FILE_UPLOAD_ROOT: /data/uploads
    volumes:
    - collector-staging:/data/pbit-staging
    - collector-uploads:/data/uploads
    healthcheck:
      test:
      - CMD-SHELL
      - 'wget -q -O /dev/null --header "X-Internal-Token: $$INTERNAL_TOKEN" "http://localhost:8096/healthz?check=db"'
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 256
    command:
    - --config=/etc/otel-collector-config.yaml
    volumes:
    - ./ops/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped
  jaeger:
    image: jaegertracing/all-in-one:latest
    mem_limit: 512m
    cpus: '0.5'
    pids_limit: 256
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
    - 127.0.0.1:16686:16686
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:latest
    mem_limit: 512m
    cpus: '0.5'
    pids_limit: 256
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    volumes:
    - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./ops/alerts:/etc/prometheus/alerts:ro
    ports:
    - 127.0.0.1:9090:9090
    restart: unless-stopped
  alertmanager:
    image: prom/alertmanager:latest
    mem_limit: 128m
    cpus: '0.25'
    pids_limit: 128
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
    - ./ops/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
    - 127.0.0.1:9093:9093
    restart: unless-stopped
  grafana:
    image: grafana/grafana:latest
    mem_limit: 512m
    cpus: '0.5'
    pids_limit: 256
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      # Land on the SLO dashboard right after login instead of an empty home.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/dashboards/lakehouse.json
    ports:
    - 127.0.0.1:3000:3000
    volumes:
    - grafana-data:/var/lib/grafana
    - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./ops/grafana/dashboards-provisioned:/etc/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
  db-migrate:
    # One-shot migration runner: brings the DB (fresh OR existing) up to the
    # current schema + per-service least-privilege roles + role passwords, then
    # applies docs/migrations/*.sql exactly once each. App services wait for this
    # to finish (depends_on: service_completed_successfully). Replaces the old
    # initdb-only bootstrap so EXISTING databases also receive updates.
    image: pgvector/pgvector:pg16
    mem_limit: 256m
    cpus: '0.5'
    pids_limit: 256
    environment:
      # Superuser DSN — the runner creates roles + applies DDL.
      DATABASE_URL: postgres://lakehouse2ontology-enterprise:${POSTGRES_PASSWORD}@postgres:5432/lakehouse2ontology-enterprise?sslmode=disable
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    entrypoint: ["sh", "/run-migrations.sh"]
    volumes:
    - ./scripts/run-migrations.sh:/run-migrations.sh:ro
    - ./docs/schema/schema.sql:/migrations/schema.sql:ro
    - ./ops/db-roles.sql:/migrations/db-roles.sql:ro
    - ./docs/migrations:/migrations/versions:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
  postgres:
    image: pgvector/pgvector:pg16
    mem_limit: 1g
    cpus: '1.0'
    pids_limit: 512
    # max_connections raised from the default 100 to cover the 6-service pool
    # budget (6 × srvkit MaxOpen 20 = 120) plus headroom for psql/maintenance.
    command:
    - postgres
    - -c
    - max_connections=200
    - -c
    - shared_buffers=256MB
    environment:
      POSTGRES_DB: lakehouse2ontology-enterprise
      POSTGRES_USER: lakehouse2ontology-enterprise
      # Fail compose up if unset — never bootstrap the superuser with a blank password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
    - postgres-data:/var/lib/postgresql/data
    # Schema + roles + passwords + versioned migrations are applied by the
    # `db-migrate` one-shot service (scripts/run-migrations.sh) on every up —
    # it handles fresh AND existing DBs. (initdb-only bootstrap was removed:
    # it ran only on an empty volume, so existing DBs never got updates.)
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U lakehouse2ontology-enterprise
      interval: 5s
      retries: 10
      timeout: 3s
      start_period: 10s
    restart: unless-stopped
volumes:
  collector-staging: null
  collector-uploads: null
  postgres-data: null
  grafana-data: null
