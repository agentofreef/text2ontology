<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1600" height="400" fill="#FFFFFF"/>

  <!-- Industrial trace marks: thin top and bottom rules -->
  <line x1="0" y1="0" x2="1600" y2="0" stroke="#171717" stroke-width="2"/>
  <line x1="0" y1="400" x2="1600" y2="400" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Top-right industrial label -->
  <text x="1560" y="32" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#737373" text-anchor="end" letter-spacing="0.18em">// COMMUNITY EDITION  /  v0</text>

  <!-- Left: scaled logo cluster.
       Original viewBox 32x32 → scale 7.5 = 240x240 placeholder area. -->
  <g transform="translate(96 88) scale(7.5)">
    <!-- Ontology block (back, soft neutral gray) — 3 graph nodes + edges -->
    <rect x="3" y="3" width="18" height="18" fill="#D4D4D4"/>
    <line x1="9" y1="9" x2="16" y2="9" stroke="#171717" stroke-width="0.9"/>
    <line x1="9" y1="9" x2="12" y2="16" stroke="#171717" stroke-width="0.9"/>
    <line x1="16" y1="9" x2="12" y2="16" stroke="#171717" stroke-width="0.9"/>
    <circle cx="9" cy="9" r="1.6" fill="#171717"/>
    <circle cx="16" cy="9" r="1.6" fill="#171717"/>
    <circle cx="12" cy="16" r="1.6" fill="#171717"/>
    <!-- Data block (front, near-black) — 3 table rows -->
    <rect x="13" y="13" width="16" height="16" fill="#171717"/>
    <line x1="16" y1="18" x2="26" y2="18" stroke="#D4D4D4" stroke-width="0.9"/>
    <line x1="16" y1="22" x2="26" y2="22" stroke="#D4D4D4" stroke-width="0.9"/>
    <line x1="16" y1="26" x2="26" y2="26" stroke="#D4D4D4" stroke-width="0.9"/>
  </g>

  <!-- Logo caption -->
  <text x="216" y="378" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#737373" text-anchor="middle" letter-spacing="0.18em">ONTOLOGY  +  DATA</text>

  <!-- Right: title + tagline block -->
  <g transform="translate(440 0)">
    <!-- Pre-title eyebrow -->
    <text x="0" y="120" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" fill="#737373" letter-spacing="0.22em">A REFERENCE IMPLEMENTATION</text>

    <!-- Title -->
    <text x="0" y="200" font-size="84" font-weight="700" fill="#171717" letter-spacing="-0.025em">text2ontology</text>

    <!-- Divider rule -->
    <line x1="0" y1="226" x2="64" y2="226" stroke="#171717" stroke-width="2"/>

    <!-- Primary tagline -->
    <text x="0" y="266" font-size="26" font-weight="500" fill="#171717" letter-spacing="-0.01em">Ontology before query.</text>

    <!-- Secondary tagline -->
    <text x="0" y="298" font-size="17" fill="#525252" letter-spacing="-0.005em">Build the meaning before you analyze.</text>

    <!-- Pipeline trace -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="0.18em">
      <text x="0" y="358" fill="#171717">QUESTION</text>
      <text x="120" y="358" fill="#737373">→</text>
      <text x="148" y="358" fill="#171717">RECALL</text>
      <text x="240" y="358" fill="#737373">→</text>
      <text x="268" y="358" fill="#171717">INTENT</text>
      <text x="360" y="358" fill="#737373">→</text>
      <text x="388" y="358" fill="#171717">POSTGRES SQL</text>
      <text x="552" y="358" fill="#737373">→</text>
      <text x="580" y="358" fill="#171717">ANSWER</text>
    </g>
  </g>

  <!-- Bottom-left build stamp -->
  <text x="40" y="32" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" fill="#737373" letter-spacing="0.18em">// 7 GO SERVICES  ·  NEXT.JS 16  ·  POSTGRES + PGVECTOR</text>
</svg>
