# staticcheck configuration for the lakehouse2ontology workspace.
#
# ST1001 (dot-imports should not be used) is disabled as a deliberate, repo-wide
# team convention. The shared helper packages — most prominently
# `github.com/lakehouse2ontology/httputil` (exposing `M`, `JsonResp`,
# `HandleOptions`, `IsValidUUID`, …) — are dot-imported in 60+ files across every
# service so handler code reads as `JsonResp(w, M{...})` rather than
# `httputil.JsonResp(w, httputil.M{...})`. Mass-rewriting these dot-imports would
# be a large, churny, regression-prone change for no functional benefit, so we
# formally suppress ST1001 instead of fighting the lint on every file.
#
# All other checks remain enabled ("all").
checks = ["all", "-ST1001"]
