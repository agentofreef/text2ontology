# ops/prometheus.yml
# Prometheus scrape configuration for lakehouse2ontology services.
# Services expose a real /metrics endpoint via pkg/observability
# (promhttp.Handler + the postgres_pool_* collector and the duration/error
# histograms in §4.2).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting rules live in ops/alerts/ and are mounted into the prometheus
# container at /etc/prometheus/alerts (read-only). Add this compose mount:
#   ./ops/alerts:/etc/prometheus/alerts:ro
# The path may be empty until that mount lands; prometheus simply loads no
# rules until then, then picks them up on reload (SIGHUP / POST /-/reload).
rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: backend-api
    static_configs:
      - targets: ['backend-api:8090']
    metrics_path: /metrics

  - job_name: agent-server
    static_configs:
      - targets: ['agent-server:8092']
    metrics_path: /metrics

  - job_name: recall-server
    static_configs:
      - targets: ['recall-server:8093']
    metrics_path: /metrics

  - job_name: lakehouse-sql-server
    static_configs:
      - targets: ['lakehouse-sql-server:8094']
    metrics_path: /metrics

  - job_name: mcp-tools-server
    static_configs:
      - targets: ['mcp-tools-server:8095']
    metrics_path: /metrics

  - job_name: collector-server
    static_configs:
      - targets: ['collector-server:8096']
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: /metrics
