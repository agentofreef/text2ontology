apiVersion: 1

# Loads every dashboard JSON mounted at /etc/dashboards (see compose volume).
providers:
  - name: lakehouse
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/dashboards
      foldersFromFilesStructure: false
