# ops/grafana/provisioning/datasources.yaml
# Grafana auto-provisioned data sources for lakehouse2ontology.
# Mounted at /etc/grafana/provisioning/datasources/ inside the container.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
