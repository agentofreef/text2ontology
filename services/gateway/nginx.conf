# services/gateway/nginx.conf
#
# Single ingress reverse proxy for the text2ontology stack. The browser hits
# ONE host port (18080 → container 80); this file dispatches by path prefix
# to the right service over compose-internal DNS.
#
# Service ports inside the compose network (do NOT change without updating
# docker-compose.yml + each service's main.go):
#   frontend         :80    (nginx serving Next.js static export)
#   backend-api      :8090
#   agent-server     :8092
#   recall-server    :8093  (service-to-service only; not proxied here)
#   lakehouse-sql    :8094  (service-to-service only; not proxied here)
#   mcp-tools-server :8095
#   collector-server :8096
#
# SSE endpoints (lakehouse-agent-stream) need proxy_buffering off + long
# timeouts; file uploads need a generous client_max_body_size.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # CSV/XLSX import + PBIT upload bodies can exceed nginx's 1M default.
    client_max_body_size 200M;

    # Always forward the real client + scheme so downstream auth/audit logs
    # don't see only the gateway IP.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    log_format  upstream  '$remote_addr - "$request" $status '
                          'upstream=$upstream_addr request_time=$request_time';
    access_log /var/log/nginx/access.log upstream;

    upstream gw_frontend   { server frontend:80;         keepalive 16; }
    upstream gw_backend    { server backend-api:8090;    keepalive 16; }
    upstream gw_agent      { server agent-server:8092;   keepalive 16; }
    upstream gw_collector  { server collector-server:8096; keepalive 16; }
    upstream gw_mcp        { server mcp-tools-server:8095; keepalive 16; }

    server {
        listen      80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Gateway's own liveness probe (used by docker-compose healthcheck).
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Defense-in-depth: /internal/* is service-to-service only. Each
        # service still authenticates it with INTERNAL_TOKEN, but we should
        # never accept it from a browser even if the auth slipped.
        location ^~ /internal/ {
            return 404;
        }

        # ── MCP (Streamable HTTP JSON-RPC transport) ──────────────────────
        # Exact /mcp path; the tools side lives under /api/mcp/ (below).
        # SSE-style stream: disable buffering + extend timeouts.
        location = /mcp {
            proxy_pass http://gw_mcp;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # MCP REST tools dispatcher.
        location ^~ /api/mcp/ {
            proxy_pass http://gw_mcp;
        }

        # ── Connector / collector-server ───────────────────────────────────
        # Two prefixes appear in the codebase: /connector/* (legacy direct)
        # and /api/connector/*. Both land on the collector.
        location ^~ /connector/ {
            proxy_pass http://gw_collector;
        }
        location ^~ /api/connector/ {
            proxy_pass http://gw_collector;
        }

        # ── agent-server: SSE + the subset of /api/ontology/* it owns ─────
        # MUST be declared BEFORE the generic /api/ rule below; nginx picks
        # the longest-prefix or regex match per location-resolution rules.
        # SSE / streaming tools live here so buffering OFF + long timeouts.
        location ~ ^/api/ontology/(lakehouse-agent-stream|lakehouse-agent-threads|lakehouse-missions|lakehouse-ledger|lakehouse-token-recall-tokenize|lh-test-suites|lh-test-runs|agent-annotations|agent-annotations-recompute|_debug/) {
            proxy_pass http://gw_agent;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            gzip off;
        }

        # ── backend-api: everything else under /api/* ─────────────────────
        # Includes /api/ontology/<entity> (objects, properties, knowledge,
        # metric-intents, query-logs, learned-facts, fact-*, links, rules,
        # aliases, methods, skills, mcp-keys, jobs, sql-passthrough,
        # lakehouse-sql, causality, token-annotations, export, import) plus
        # /api/auth/*, /api/projects, /api/prompt-config, /api/llm-config,
        # /api/llm-role-binding.
        #
        # IMPORTANT: plain prefix (NOT ^~). The ^~ modifier would tell nginx
        # to skip regex locations, which would shadow the agent-server SSE
        # regex above. With a plain prefix, regexes are evaluated first (so
        # the agent-server subset wins) and this is the fallback for the
        # rest of /api/. The more-specific ^~ /api/mcp/ and ^~ /api/connector/
        # above still short-circuit correctly for their paths.
        location /api/ {
            proxy_pass http://gw_backend;
        }

        # ── Frontend (everything else: pages, static assets, _next/*) ─────
        location / {
            proxy_pass http://gw_frontend;
        }
    }
}
