# services/gateway/nginx.conf
#
# Single ingress reverse proxy for the text2ontology stack. The browser hits
# ONE host port (18080 / 10020 → container 80); this file dispatches by path
# prefix to the right service over compose-internal DNS.
#
# ── Canonical routing model (W6-2 unification) ─────────────────────────────
# The frontend bundle is built with Next.js `basePath: '/lakehouse'`
# (frontend/next.config.ts) and empty NEXT_PUBLIC_*_URL, so the browser issues
# SAME-ORIGIN requests under the `/lakehouse` prefix:
#   - UI / static:  GET /lakehouse/...            → frontend container
#   - API calls:    *   /lakehouse/api/...        → backend services
# This gateway therefore owns the `/lakehouse/*` surface directly: it strips the
# `/lakehouse` basePath off `/lakehouse/api/*` and proxies to the right service,
# and forwards UI/static `/lakehouse/*` to the frontend container untouched.
# This makes the gateway the SOLE ingress (API calls no longer double-hop
# through the frontend container's own nginx). The frontend container's
# nginx.conf retains an equivalent self-proxy as a defense-in-depth fallback;
# the gateway path is authoritative.
#
# Root-level `/mcp`, `/api/mcp/`, `/api/connector/`, `/connector/` are kept at
# the origin root (NOT basePath-prefixed) so stock external MCP clients and
# legacy connector callers that don't speak the basePath work out of the box.
#
# Service ports inside the compose network (do NOT change without updating
# docker-compose.yml + each service's main.go):
#   frontend         :80    (nginx serving Next.js static export)
#   backend-api      :8090
#   agent-server     :8092
#   recall-server    :8093  (debug inspector only proxied here)
#   lakehouse-sql    :8094  (service-to-service only; not proxied here)
#   mcp-tools-server :8095
#   collector-server :8096
#
# SSE endpoints (lakehouse-agent-stream, ingest progress, MCP streamable-HTTP)
# need proxy_buffering off + LONG/disabled read timeouts; file uploads need a
# generous client_max_body_size.

worker_processes auto;
# Run as a non-root container (W5-13): keep the pid file and logs off
# root-owned paths. Logs go to the container's stdout/stderr (standard for
# `docker logs`); the pid lives in /tmp which the non-root user can write.
pid /tmp/nginx.pid;
error_log /dev/stderr warn;
events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # CSV/XLSX import + PBIT upload bodies can exceed nginx's 1M default.
    client_max_body_size 200M;

    # ── Rate / connection limiting (dev-sane defaults) ────────────────────
    # Per-client request rate: 60 r/s sustained with a burst of 120 (nodelay so
    # the burst is served immediately, not trickled). Next.js 16 App Router
    # sidebars can prefetch dozens of `__next._head.txt` segment payloads in
    # parallel on mount — those static-export assets bypass this zone entirely
    # via the dedicated `/lakehouse/_next/` + `*__next._head.txt`/`*.rsc`
    # locations below (no limit + proxy_cache), so this zone only governs API
    # + page traffic and trips only on abusive loops.
    limit_req_zone  $binary_remote_addr zone=req_per_ip:10m rate=60r/s;
    # Per-client concurrent connections: 64 (SSE streams hold a connection open,
    # and the UI opens several in parallel — keep this comfortably high).
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
    limit_req_status 429;
    limit_conn_status 429;

    # ── Proxy cache for immutable static-export assets ────────────────────
    # `_next/static/*` chunks/css/fonts are hashed → immutable for a given URL.
    # Next.js 16's `__next._head.txt` segment-prefetch payloads are also
    # build-time static files. Cache them in tmpfs so a sidebar full of <Link>
    # prefetches doesn't round-trip to the frontend container on every visit.
    # /tmp is writable by the non-root nginx user (same place as pid file).
    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=fe_static:10m
                     max_size=200m inactive=24h use_temp_path=off;

    # ── Security response headers (applied to all responses) ──────────────
    # add_header at the http{} level is inherited by location blocks that do
    # NOT declare their own add_header. Locations that add caching headers
    # re-declare these so the security headers are not dropped.
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP: permissive enough for the Next.js static export (it ships inline
    # bootstrap scripts/styles, so 'unsafe-inline'/'unsafe-eval' are required;
    # tightening to nonces needs a frontend build change — out of scope here).
    # connect-src 'self' covers the same-origin /lakehouse/api/* + SSE calls.
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # HSTS is a NO-OP on plain HTTP (this gateway listens on :80 only). It is
    # declared here so it activates automatically once TLS terminates in front
    # of (or on) the gateway; harmless until then.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Always forward the real client + scheme so downstream auth/audit logs
    # don't see only the gateway IP.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    log_format  upstream  '$remote_addr - "$request" $status '
                          'upstream=$upstream_addr request_time=$request_time';
    access_log /dev/stdout upstream;

    upstream gw_frontend   { server frontend:8080;        keepalive 16; }
    upstream gw_backend    { server backend-api:8090;     keepalive 16; }
    upstream gw_agent      { server agent-server:8092;    keepalive 16; }
    upstream gw_recall     { server recall-server:8093;   keepalive 16; }
    upstream gw_collector  { server collector-server:8096; keepalive 16; }
    upstream gw_mcp        { server mcp-tools-server:8095; keepalive 16; }

    server {
        listen      8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        # Emit RELATIVE redirects (Location: /lakehouse/ not http://host:8080/...).
        # The container listens on 8080 internally but is published on a different
        # host port (e.g. 28080); an absolute redirect would leak :8080 and send
        # the browser to the wrong port. Relative redirects preserve the original
        # scheme/host/port the browser used.
        absolute_redirect off;

        # Apply the per-IP connection cap server-wide. Per-location req limits
        # are declared on the non-SSE locations below (SSE locations are left
        # unlimited so a long-lived stream is never throttled mid-flight).
        limit_conn conn_per_ip 64;

        # Gateway's own liveness probe (used by docker-compose healthcheck).
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Defense-in-depth: /internal/* is service-to-service only. Each
        # service still authenticates it with INTERNAL_TOKEN, but we should
        # never accept it from a browser even if the auth slipped. Covers both
        # the root and basePath-prefixed forms.
        location ^~ /internal/ {
            return 404;
        }
        location ^~ /lakehouse/internal/ {
            return 404;
        }

        # Root redirect to the basePath UI so http://host:18080/ lands on the app.
        location = / {
            return 302 /lakehouse/;
        }

        # ── MCP (Streamable HTTP JSON-RPC transport) ──────────────────────
        # Kept at origin root (not basePath) so stock MCP clients work.
        # SSE-style stream: disable buffering + KEEP long timeouts (no
        # proxy_read_timeout shortening, no rate limit — streaming).
        location = /mcp {
            proxy_pass http://gw_mcp;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 5s;
            chunked_transfer_encoding on;
        }

        # MCP REST tools dispatcher (non-streaming → bounded timeouts + rate limit).
        location ^~ /api/mcp/ {
            limit_req zone=req_per_ip burst=120 nodelay;
            proxy_pass http://gw_mcp;
            proxy_connect_timeout 5s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ── Connector / collector-server (root-level legacy + /api forms) ──
        # Ingest control plane; bodies stream progress (SSE) → buffering off,
        # generous read timeout, no request-rate limit (long uploads).
        location ^~ /connector/ {
            proxy_pass http://gw_collector;
            proxy_buffering off;
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
        location ^~ /api/connector/ {
            proxy_pass http://gw_collector;
            proxy_buffering off;
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ════════════════════════════════════════════════════════════════
        # basePath-prefixed surface: /lakehouse/*  (the live browser contract)
        # ════════════════════════════════════════════════════════════════

        # ── collector-server under basePath (ingest). Must precede the
        #    catch-all /lakehouse/api/ block. Streaming → buffering off.
        location ^~ /lakehouse/api/connector/ {
            rewrite ^/lakehouse(/.*)$ $1 break;
            proxy_pass http://gw_collector;
            proxy_buffering off;
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ── recall-server debug inspector under basePath (non-stream). ─────
        location ~ ^/lakehouse/api/ontology/lakehouse-token-recall-debug {
            limit_req zone=req_per_ip burst=120 nodelay;
            rewrite ^/lakehouse(/.*)$ $1 break;
            proxy_pass http://gw_recall;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── agent-server SSE + streaming family under basePath. ────────────
        # MUST be declared before the catch-all /lakehouse/api/ prefix; regex
        # locations are evaluated before the plain prefix below.
        # SSE / streaming → buffering OFF + LONG read/send timeouts. NO request
        # rate limit (a long-lived stream must never be throttled). Mirrors the
        # frontend container's agent route set exactly.
        location ~ ^/lakehouse/api/ontology/(lakehouse-agent-stream|lakehouse-agent-threads|lakehouse-missions|lakehouse-ledger|lakehouse-token-recall-tokenize|lh-test-suites|lh-test-runs|agent-annotations|agent-annotations-recompute|agent-annotations-import|agent-annotations-export|agent-annotations-vector-status|agent-annotations-bulk-status|lakehouse-metric-preview|lakehouse-metric-distinct|_debug/) {
            rewrite ^/lakehouse(/.*)$ $1 break;
            proxy_pass http://gw_agent;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            gzip off;
        }

        # ── backend-api: everything else under /lakehouse/api/* ────────────
        # CRUD / auth / projects / config / export / import / smartquery /
        # pbit ingest. PBIT ingest streams SSE progress → keep buffering off
        # and a long read timeout, but still bound connect + apply rate limit
        # (these are request-initiated, not infinite streams like agent SSE).
        # NOTE: plain prefix (NOT ^~). The default frontend build ships with no
        # NEXT_PUBLIC_AGENT_SERVER_URL, so agent calls (lakehouse-agent-*, lh-test-*,
        # agent-annotations, …) go to same-origin /lakehouse/api/… too. With ^~ here
        # this longest-prefix match would short-circuit nginx regex evaluation and
        # swallow those into backend-api (→ 404, empty annotation/history/dataset
        # pages). Dropping ^~ lets the agent regex location above win first; all
        # other /lakehouse/api/* still falls through here. Mirrors the root /api/
        # block below, which is already a plain prefix for the same reason.
        location /lakehouse/api/ {
            limit_req zone=req_per_ip burst=120 nodelay;
            rewrite ^/lakehouse(/.*)$ $1 break;
            proxy_pass http://gw_backend;
            proxy_buffering off;
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ── Static-export immutable assets under /lakehouse/_next/ ─────────
        # _next/static/{chunks,css,media,fonts}/* are hashed → never change for
        # a given URL. Skip the per-IP rate limit (these never modify state),
        # cache them in nginx (tmpfs), and let the browser keep them too.
        # `^~` so it wins over the plain `/lakehouse/` catch-all below without
        # falling into regex evaluation.
        location ^~ /lakehouse/_next/ {
            proxy_pass http://gw_frontend;
            proxy_cache fe_static;
            proxy_cache_key "$request_uri";
            proxy_cache_valid 200 304 24h;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Next.js 16 segment-prefetch payloads + legacy RSC files ────────
        # `__next._head.txt?_rsc=<hash>` is the new App Router prefetch payload
        # emitted by `output: 'export'`; a sidebar with N <Link>s produces N
        # parallel GETs on every page mount. Same idea for any leftover `.rsc`.
        # No rate limit (build-time static), cache in nginx, key off the URI
        # so the `_rsc=` cache-buster maps deterministically to the on-disk
        # file. Note: this regex location must follow the `^~ /lakehouse/_next/`
        # block above and the plain-prefix `/lakehouse/` block below — nginx
        # only evaluates regex when the longest matching prefix is NOT `^~`.
        location ~ ^/lakehouse/.*(__next\._head\.txt|\.rsc)$ {
            proxy_pass http://gw_frontend;
            proxy_cache fe_static;
            proxy_cache_key "$request_uri";
            proxy_cache_valid 200 304 24h;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Frontend UI + remaining /lakehouse/* (pages, favicon, etc.) ────
        # Plain prefix (NOT ^~) so the segment-prefetch regex above wins first
        # for `__next._head.txt`/`.rsc` URLs. Bounded timeouts; rate-limited
        # (page navigation only — static asset fan-out handled above).
        location /lakehouse/ {
            limit_req zone=req_per_ip burst=120 nodelay;
            proxy_pass http://gw_frontend;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Root-level /api/* fallback (non-basePath clients / direct API). ─
        # The agent-server SSE subset is matched first via regex (streaming),
        # then the generic /api/ prefix falls through to backend-api.
        location ~ ^/api/ontology/(lakehouse-agent-stream|lakehouse-agent-threads|lakehouse-missions|lakehouse-ledger|lakehouse-token-recall-tokenize|lh-test-suites|lh-test-runs|agent-annotations|agent-annotations-recompute|agent-annotations-import|agent-annotations-export|agent-annotations-vector-status|agent-annotations-bulk-status|lakehouse-metric-preview|lakehouse-metric-distinct|_debug/) {
            proxy_pass http://gw_agent;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            gzip off;
        }
        location /api/ {
            limit_req zone=req_per_ip burst=120 nodelay;
            proxy_pass http://gw_backend;
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # ── Frontend (everything else: bare pages, _next/*, favicon, etc.) ─
        location / {
            limit_req zone=req_per_ip burst=120 nodelay;
            proxy_pass http://gw_frontend;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
