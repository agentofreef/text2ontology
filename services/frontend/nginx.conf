# services/frontend/nginx.conf
#
# Unified gateway: serves the Next.js static export AND reverse-proxies
# /lakehouse/api/* to the appropriate sidecar. Both published ports
# (18080 host / 10020 host) land here; 10020 is the "public entrypoint".
#
# Routes:
#   /healthz                      → 200 plain text
#   /                             → 302 /lakehouse/
#   /lakehouse/                   → Next.js static assets + SPA fallback
#   /lakehouse/api/ontology/lakehouse-agent-*   → agent-server  (SSE)
#   /lakehouse/api/ontology/lh-test-*           → agent-server
#   /lakehouse/api/ontology/_debug/ledger-rebuild → agent-server
#   /lakehouse/api/ontology/lakehouse-ledger    → agent-server
#   /lakehouse/api/ontology/lakehouse-missions  → agent-server
#   /lakehouse/api/ontology/agent-annotations   → agent-server
#   /lakehouse/api/ontology/lakehouse-token-recall-tokenize → agent-server
#   /lakehouse/api/ontology/lakehouse-token-recall-debug    → recall-server
#   /lakehouse/api/*              → backend-api (catch-all: CRUD / auth /
#                                   projects / ingest / pbit-* / export /
#                                   import / config / etc.)
#
# The bundle uses same-origin URLs (no NEXT_PUBLIC_*_URL baked in), so the
# browser hits whatever origin loaded the page — no CORS preflight, no
# cross-origin cookies, no baked-in hostnames to rotate.

server {
    # Listen on an unprivileged port (>1024) so the container can run as a
    # non-root user (W5-13). The gateway upstream and compose port maps target
    # 8080 to match.
    listen 8080;
    server_name _;

    # Keep redirects path-relative so the browser's original host:port
    # (e.g. localhost:18080) is preserved. Otherwise nginx fabricates
    # an absolute URL from the Host header which drops the port.
    absolute_redirect off;

    # Agent + Recall SSE endpoints need buffering disabled so token stream
    # reaches the browser live instead of getting coalesced.
    client_max_body_size 128m;

    # probe endpoint for docker compose healthcheck
    location = /healthz {
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }

    # Next.js static export is under /lakehouse basePath
    location = / {
        return 302 /lakehouse/;
    }
    location = /lakehouse {
        return 302 /lakehouse/;
    }

    # ── API gateway routes ───────────────────────────────────────────────
    # Agent-server family (SSE streaming). proxy_buffering off is critical
    # or thinking/function_call events pile up until the response ends.
    # rewrite strips the /lakehouse basePath before forwarding.
    location ~ ^/lakehouse/api/ontology/(lakehouse-agent-|lh-test-|_debug/ledger-rebuild|lakehouse-ledger|lakehouse-missions|agent-annotations|lakehouse-token-recall-tokenize|analyst/workspace) {
        rewrite ^/lakehouse(/.*)$ $1 break;
        proxy_pass http://agent-server:8092;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Recall-server debug inspector.
    location ~ ^/lakehouse/api/ontology/lakehouse-token-recall-debug {
        rewrite ^/lakehouse(/.*)$ $1 break;
        proxy_pass http://recall-server:8093;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Collector-server (PBI/Postgres/File ingest). Phase 2: PBI; Phase 3: Postgres; Phase 4: File.
    # Must come BEFORE the catch-all /lakehouse/api/ block to take precedence.
    location /lakehouse/api/connector/ {
        rewrite ^/lakehouse(/.*)$ $1 break;
        proxy_pass http://collector-server:8096;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Catch-all: everything else under /lakehouse/api → backend-api.
    # PBIT ingest streams SSE progress events — keep buffering off.
    location /lakehouse/api/ {
        rewrite ^/lakehouse(/.*)$ $1 break;
        proxy_pass http://backend-api:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── MCP (Model Context Protocol) gateway ──────────────────────────
    # External clients (Claude Code / Claude Desktop / third-party MCP SDK)
    # reach the mcp-tools-server here. Auth is Bearer <API-key> on every
    # request — see docs/mcp-integration.md for setup. Unlike /api/* which
    # is basePath-prefixed, /mcp and /api/mcp/ are at the origin root so
    # stock MCP clients that don't support basePath work out of the box.
    location /mcp {
        proxy_pass http://mcp-tools-server:8095;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # MCP streamable-HTTP may return SSE frames — keep everything open.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # REST fallback for clients that don't speak JSON-RPC: same 3 tools,
    # one endpoint per tool name. Also used by the settings UI's docs
    # section as a copy-pasteable curl example.
    location /api/mcp/ {
        proxy_pass http://mcp-tools-server:8095;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Next.js `output: 'export'` with basePath='/lakehouse' produces
    # out/ with index.html + _next/ at the ROOT of the output dir.
    # Three-tier location precedence lets us serve both the HTML and
    # the prefixed _next/ chunks without an nginx alias+try_files
    # interaction bug:
    #
    # 1) exact /lakehouse/_next/(\w…) — stripped to /_next/… on disk
    # 2) /lakehouse/ — SPA routes; fallback to /index.html
    # 3) /_next/ — kept for backward-compat direct hits
    location ~ ^/lakehouse/_next/(.*)$ {
        alias /usr/share/nginx/html/_next/$1;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
    }

    # Static assets under /lakehouse/ that live at out/ root (favicon.svg,
    # logo.svg, anything else in public/). Next.js export does NOT basePath-
    # prefix public/, so nginx has to alias them through. Using a regex
    # capture avoids the alias+try_files 404 bug on prefix locations.
    location ~ ^/lakehouse/([^/]+\.(?:ico|svg|png|jpg|jpeg|gif|webp|woff2?|txt|xml|json))$ {
        alias /usr/share/nginx/html/$1;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location /lakehouse/ {
        alias /usr/share/nginx/html/;
        # Strip trailing slash from non-root /lakehouse/* URLs so Next.js
        # `output: 'export'` files (generated as foo.html, NOT foo/index.html)
        # are found. Without this, /lakehouse/zh/ misses $uri.html and falls
        # through to root /index.html (LocaleBootstrapModal), which —
        # combined with persisted omc-locale — creates an infinite redirect.
        # `last` does an INTERNAL rewrite (no 301 to browser) so port :18080
        # is preserved (we'd otherwise lose it since Host header lacks port).
        rewrite ^/lakehouse/(.+)/$ /lakehouse/$1 last;
        try_files $uri $uri.html $uri/index.html /index.html =404;
    }

    location /_next/ {
        alias /usr/share/nginx/html/_next/;
        try_files $uri =404;
    }

    # Caching hints for immutable static assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, immutable";
        try_files $uri =404;
    }
}
